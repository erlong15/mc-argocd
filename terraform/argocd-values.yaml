global:
  domain: argocd.erlong.ru

configs:
  params:
    # Envoy Gateway terminates TLS and forwards plain HTTP to argocd-server.
    server.insecure: true
  cm:
    # По умолчанию argocd-repo-server разрешает только http/https в helm.valueFiles.
    # Добавляем secrets+ варианты, иначе `secrets://values-secret.enc.yaml`
    # отбивается с "the URL scheme 'secrets' is not allowed".
    helm.valuesFileSchemes: >-
      secrets, secrets+gpg-import, secrets+gpg-import-kubernetes,
      secrets+age-import, secrets+age-import-kubernetes,
      https, http

server:
  service:
    type: ClusterIP

  # HTTPRoute НЕ включаем в этом чарте: helm_release выполняется на bootstrap,
  # когда Gateway API CRDs ещё не установлены (их приносит envoy-gateway).
  # HTTPRoute лежит в repo/infra/envoy-gateway/templates/argocd-httproute.yaml
  # и приезжает в одном Argo-синке вместе с CRDs.
  httproute:
    enabled: false

  certificate:
    enabled: false

applicationSet:
  enabled: true

notifications:
  enabled: false

dex:
  enabled: false

# helm-secrets + sops + age устанавливаются в argocd-repo-server как custom tools.
# Приватный age-ключ монтируется из Secret `helm-secrets-private-keys` (см. argocd.tf).
repoServer:
  env:
    - name: HELM_PLUGINS
      value: /custom-tools/helm-plugins/
    - name: HELM_SECRETS_CURL_CONTAINER
      value: "true"
    - name: SOPS_AGE_KEY_FILE
      value: /helm-secrets-private-keys/key.txt
    - name: PATH
      value: /custom-tools:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
  volumes:
    - name: custom-tools
      emptyDir: {}
    - name: helm-secrets-private-keys
      secret:
        secretName: helm-secrets-private-keys
        optional: true
  volumeMounts:
    - name: custom-tools
      mountPath: /custom-tools
    - name: helm-secrets-private-keys
      mountPath: /helm-secrets-private-keys
  initContainers:
    - name: download-tools
      image: alpine:3.19
      command:
        - /bin/sh
        - -c
        - |
          set -eux
          apk add --no-cache curl tar bash git

          # sops
          curl -sSL -o /custom-tools/sops \
            https://github.com/getsops/sops/releases/download/v3.9.1/sops-v3.9.1.linux.amd64
          chmod +x /custom-tools/sops

          # age
          curl -sSL https://github.com/FiloSottile/age/releases/download/v1.2.0/age-v1.2.0-linux-amd64.tar.gz \
            | tar -xz -C /custom-tools --strip-components=1 age/age age/age-keygen

          # helm-secrets plugin
          mkdir -p /custom-tools/helm-plugins/helm-secrets
          # Тарбол релиза содержит верхний каталог helm-secrets/, поэтому
          # без --strip-components=1 plugin.yaml оказывается на уровень глубже,
          # чем ждёт Helm, и downloader для secrets:// не регистрируется
          # (симптом: "open secrets://...: no such file or directory").
          # v4.7.6 убрал двойное `command`+`platformCommand` в plugin.yaml —
          # на Helm 3.18+ старые версии (<=4.6.x) пишут WARNING в stdout,
          # и ArgoCD ломается на unmarshal этого сообщения как манифеста.
          curl -sSL https://github.com/jkroepke/helm-secrets/releases/download/v4.7.6/helm-secrets.tar.gz \
            | tar -xz --strip-components=1 -C /custom-tools/helm-plugins/helm-secrets
      volumeMounts:
        - name: custom-tools
          mountPath: /custom-tools
