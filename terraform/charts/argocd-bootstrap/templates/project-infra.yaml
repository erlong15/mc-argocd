apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
spec:
  description: Cluster infrastructure managed via GitOps (Envoy Gateway, cert-manager, ingress for argocd)
  sourceRepos:
    - {{ .Values.repoUrl | quote }}
  destinations:
    - server: https://kubernetes.default.svc
      namespace: infra
    # HTTPRoute для argocd-server живёт рядом с бэкендом в ns argocd
    # (repo/infra/envoy-gateway/templates/argocd-httproute.yaml),
    # чтобы не разводить ReferenceGrant cross-ns.
    - server: https://kubernetes.default.svc
      namespace: argocd
    # cert-manager-webhook-yc'у нужен RoleBinding в kube-system, чтобы через APIService
    # aggregation читать extension-apiserver-authentication-reader (configmap
    # requestheader-ca). Без этого kube-apiserver не аутентифицирует вебхук.
    - server: https://kubernetes.default.svc
      namespace: kube-system
    # Secret'ы из repo/secrets/ приземляются сюда по умолчанию
    # (Application `secrets`, repo/infra/projects/secretapp/application.yaml).
    - server: https://kubernetes.default.svc
      namespace: secrets
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
    # Динамика, не управляемая гитом: её создают операторы/кластер по факту наличия CR.
    # Оставляем warn=true, чтобы ловить реальный мусор — но прячем ожидаемое.
    ignore:
      # Envoy Gateway оператор штампует envoy-infra-<gw-name>-<hash> (Deployment/Service/SA/CM).
      - group: ""
        kind: Service
        name: envoy-*
      - group: apps
        kind: Deployment
        name: envoy-*
      - group: ""
        kind: ConfigMap
        name: envoy-*
      - group: ""
        kind: ServiceAccount
        name: envoy-*
      # envoy-gateway операторские секреты (envoy, envoy-gateway, envoy-oidc-hmac, envoy-rate-limit).
      - group: ""
        kind: Secret
        name: envoy*
      # cert-manager динамика: webhook CA + serving cert, ACME account, выданные TLS-серты.
      - group: ""
        kind: Secret
        name: cert-manager-webhook-yc-ca
      - group: ""
        kind: Secret
        name: cert-manager-webhook-yc-webhook-tls
      - group: ""
        kind: Secret
        name: letsencrypt-account-key
      - group: ""
        kind: Secret
        name: argocd-tls
      # Создаётся самим кубером при создании namespace.
      - group: ""
        kind: ConfigMap
        name: kube-root-ca.crt
      - group: ""
        kind: ServiceAccount
        name: default
