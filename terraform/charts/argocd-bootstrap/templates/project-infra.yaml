apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: infra
  namespace: argocd
spec:
  description: Cluster infrastructure managed via GitOps (Envoy Gateway, cert-manager, ingress for argocd)
  sourceRepos:
    - {{ .Values.repoUrl | quote }}
  destinations:
    - server: https://kubernetes.default.svc
      namespace: infra
    # HTTPRoute для argocd-server живёт рядом с бэкендом в ns argocd
    # (repo/infra/envoy-gateway/templates/argocd-httproute.yaml),
    # чтобы не разводить ReferenceGrant cross-ns.
    - server: https://kubernetes.default.svc
      namespace: argocd
  clusterResourceWhitelist:
    - group: '*'
      kind: '*'
  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'
  orphanedResources:
    warn: true
