apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: infra
  namespace: argocd
spec:
  goTemplate: true
  goTemplateOptions: ["missingkey=error"]
  generators:
    - git:
        repoURL: {{ .Values.repoUrl | quote }}
        revision: {{ .Values.targetRevision | quote }}
        directories:
          - path: {{ printf "%s/*" .Values.infraPath | quote }}
          # projects/ — raw YAML (AppProject + ApplicationSet per env),
          # обрабатывается отдельным ApplicationSet'ом (appset-infra-projects.yaml).
          - path: {{ printf "%s/projects" .Values.infraPath | quote }}
            exclude: true
  template:
    metadata:
      name: '{{`{{ .path.basename }}`}}'
    spec:
      project: infra
      source:
        repoURL: {{ .Values.repoUrl | quote }}
        targetRevision: {{ .Values.targetRevision | quote }}
        path: '{{`{{ .path.path }}`}}'
        # Глобальные values: каждый подчарт берёт только нужные ему ключи.
        # lbIp известен только terraform'у, поэтому ApplicationSet генерируется здесь.
        helm:
          releaseName: '{{`{{ .path.basename }}`}}'
          valuesObject:
            lbIp: {{ .Values.lbIp | quote }}
      destination:
        server: https://kubernetes.default.svc
        namespace: infra
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
