apiVersion: v2
name: nginx
description: Prod instance of upstream nginx (umbrella-чарт для masterclass).
type: application
version: 0.1.0
# Umbrella-pattern: сам чарт почти пустой, всё прикладное — в зависимости.
# В templates/ лежит только наш HTTPRoute, который открывает сервис
# Bitnami-чарта в Envoy Gateway. Так же устроены repo/infra/envoy-gateway
# и repo/infra/cert-manager — единый стиль по всему репо.
dependencies:
  - name: nginx
    # Bitnami OCI-репозиторий. 23.0.0 — последняя на момент подготовки
    # мастеркласса. Если демо требует полностью бесплатную ветку — тот же
    # чарт мигрировал в bitnamilegacy/; можно подменить repository.
    version: 23.0.0
    repository: oci://registry-1.docker.io/bitnamicharts
    # alias: под этим ключом помещаем переопределения в values.yaml
    # (nginx: {...}). Без alias имя подчарта то же — `nginx`.
