apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "cert-manager-webhook-yc.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    app: {{ include "cert-manager-webhook-yc.name" . }}
    chart: {{ include "cert-manager-webhook-yc.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cert-manager-webhook-yc.fullname" . }}:secrets-reader
  labels:
    app: {{ include "cert-manager-webhook-yc.name" . }}
    chart: {{ include "cert-manager-webhook-yc.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
  - apiGroups: ["flowcontrol.apiserver.k8s.io"]
    resources: ["flowschemas", "prioritylevelconfigurations"]
    verbs: ["list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-yc.fullname" . }}:secrets-reader
  labels:
    app: {{ include "cert-manager-webhook-yc.name" . }}
    chart: {{ include "cert-manager-webhook-yc.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cert-manager-webhook-yc.fullname" . }}:secrets-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-yc.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Читаем ConfigMap с requestheader-ca — нужно apiserver'у для аутентификации нашего APIService.
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "cert-manager-webhook-yc.fullname" . }}:webhook-authentication-reader
  namespace: kube-system
  labels:
    app: {{ include "cert-manager-webhook-yc.name" . }}
    chart: {{ include "cert-manager-webhook-yc.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: extension-apiserver-authentication-reader
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-yc.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Делегируем auth-решения core apiserver.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-yc.fullname" . }}:auth-delegator
  labels:
    app: {{ include "cert-manager-webhook-yc.name" . }}
    chart: {{ include "cert-manager-webhook-yc.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    name: {{ include "cert-manager-webhook-yc.fullname" . }}
    namespace: {{ .Release.Namespace }}
---
# Право cert-manager'у (SA jetstack'овского чарта) дёргать наш webhook API.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "cert-manager-webhook-yc.fullname" . }}:domain-solver
  labels:
    app: {{ include "cert-manager-webhook-yc.name" . }}
    chart: {{ include "cert-manager-webhook-yc.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
rules:
  - apiGroups:
      - {{ .Values.groupName }}
    resources: ["*"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "cert-manager-webhook-yc.fullname" . }}:domain-solver
  labels:
    app: {{ include "cert-manager-webhook-yc.name" . }}
    chart: {{ include "cert-manager-webhook-yc.chart" . }}
    release: {{ .Release.Name }}
    heritage: {{ .Release.Service }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "cert-manager-webhook-yc.fullname" . }}:domain-solver
subjects:
  - apiGroup: ""
    kind: ServiceAccount
    # SA jetstack'овского cert-manager контроллера (release name "cert-manager", ns infra).
    name: {{ .Values.certManager.serviceAccountName }}
    namespace: {{ .Release.Namespace }}
