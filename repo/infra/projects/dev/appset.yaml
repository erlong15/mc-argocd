apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: apps-dev
  namespace: argocd
spec:
  # Файл конфигурации пропал — Application сохраняется (для демо drift/rollback).
  syncPolicy:
    preserveResourcesOnDeletion: true
  generators:
    - git:
        repoURL: https://github.com/erlong15/mc-argocd.git
        revision: main
        files:
          - path: repo/apps/dev/*/config.json
  template:
    metadata:
      name: '{{path.basename}}-dev'
    spec:
      project: demo-dev
      source:
        repoURL: https://github.com/erlong15/mc-argocd.git
        targetRevision: main
        path: repo/charts/nginx-demo
        helm:
          releaseName: '{{path.basename}}-dev'
          values: |
            fullnameOverride: {{path.basename}}-dev
            replicaCount: {{replicaCount}}
            resources:
              requests:
                cpu: {{cpuRequest}}
                memory: {{memoryRequest}}
              limits:
                cpu: {{cpuLimit}}
                memory: {{memoryLimit}}
            ingress:
              enabled: false
            config:
              indexHtml: |
                <html>
                  <body>
                    <h1>{{path.basename}} / dev</h1>
                    <p>{{message}}</p>
                  </body>
                </html>
      destination:
        server: https://kubernetes.default.svc
        namespace: demo-dev
      # Для демо начинаем без automated sync — включаем на шаге drift detection.
      # syncPolicy:
      #   automated:
      #     prune: true
      #     selfHeal: true
      #   syncOptions:
      #     - CreateNamespace=true
