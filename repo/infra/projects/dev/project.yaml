apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: demo-dev
  namespace: argocd
  annotations:
    # Применяется раньше ApplicationSet apps-dev (wave 0): иначе ApplicationSet
    # controller стартует реконцайл до того, как AppProject попал в его кэш,
    # и ругается «AppProject demo-dev not found».
    argocd.argoproj.io/sync-wave: "-1"
spec:
  description: Demo applications - dev environment
  sourceRepos:
    - https://github.com/erlong15/mc-argocd.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: demo-dev
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: ""
      kind: Secret
    - group: apps
      kind: Deployment
    - group: networking.k8s.io
      kind: Ingress
  orphanedResources:
    warn: true
