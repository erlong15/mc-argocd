apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: demo-prod
  namespace: argocd
spec:
  description: Demo applications - prod environment
  sourceRepos:
    - https://github.com/erlong15/mc-argocd.git
  destinations:
    - server: https://kubernetes.default.svc
      namespace: demo-prod
  clusterResourceWhitelist: []
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Service
    - group: ""
      kind: Secret
    - group: apps
      kind: Deployment
    - group: networking.k8s.io
      kind: Ingress
  orphanedResources:
    warn: true
