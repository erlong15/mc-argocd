cert-manager:
  # CRDs ставит именно этот чарт — больше их в кластере никто не приносит.
  crds:
    enabled: true
  # Нужно для Certificate с сылкой на Gateway API HTTPRoute/Gateway.
  extraArgs:
    - --enable-gateway-api
  # По умолчанию cert-manager держит leader election Role/RoleBinding в kube-system.
  # AppProject infra ограничен ns infra — переводим leader election сюда же.
  global:
    leaderElection:
      namespace: infra
