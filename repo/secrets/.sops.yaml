# Замените 'age' на ваш публичный age recipient перед запуском `sops -e`.
# Получить: `age-keygen -o ~/.config/sops/age/keys.txt` → `grep '# public key' ~/.config/sops/age/keys.txt`
creation_rules:
  - path_regex: secrets/.*\.enc\.ya?ml$
    encrypted_regex: '^(data|stringData)$'
    age: 'age1replacewithyourpublickeyxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx'
