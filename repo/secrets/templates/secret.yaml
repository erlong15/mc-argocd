{{- range .Values.secrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .name | quote }}
  namespace: {{ default $.Values.defaultNamespace .namespace | quote }}
type: Opaque
# stringData, а не data: helm-secrets отдаёт plaintext, k8s сам base64'ит при приёме.
# Избавляет от двойного encoding'а и ошибок «почему пароль внутри пода — base64?».
stringData:
{{- range $k, $v := .data }}
  {{ $k }}: {{ $v | quote }}
{{- end }}
{{- end }}
