# Шаблон для values-secret.yaml (plaintext, в .gitignore).
# После заполнения — шифруем в values-secret.enc.yaml и коммитим *.enc.yaml.
#
#   cp values-secret.example.yaml values-secret.yaml
#   # отредактировать values-secret.yaml
#   sops --encrypt --age "$PUBKEY" \
#        --encrypted-regex '^(secrets|data)$' \
#        values-secret.yaml > values-secret.enc.yaml
#   rm values-secret.yaml
#   git add values-secret.enc.yaml
#
secrets:
  - name: demo-db
    namespace: demo-dev
    data:
      DB_USER: admin
      DB_PASSWORD: change-me
  - name: api-token
    # namespace не указан — ляжет в defaultNamespace (secrets)
    data:
      token: replace-with-real-token
