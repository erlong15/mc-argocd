# Неймспейс по умолчанию для всех Secret'ов из списка ниже. Можно переопределить
# пер-секрет полем `namespace`. Для AppProject infra все используемые ns
# должны быть в destinations (см. terraform/charts/argocd-bootstrap/templates/project-infra.yaml).
defaultNamespace: secrets

# Список секретов. Значения перетираются содержимым values-secret.enc.yaml
# (расшифровывается argocd-repo-server'ом через helm-secrets на момент рендера).
# Здесь держим пустой — не хочется коммитить плейсхолдеры, которые выглядят реальными.
secrets: []
# Пример структуры (ровно такую же кладём в values-secret.yaml перед шифрованием):
#
# secrets:
#   - name: demo-db
#     namespace: demo-dev   # опционально; по умолчанию defaultNamespace
#     data:
#       DB_USER: admin
#       DB_PASSWORD: s3cret
